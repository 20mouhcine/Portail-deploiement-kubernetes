spring.application.name=Backend
spring.datasource.url=jdbc:postgresql://localhost:5432/kube_portal
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.bootstrap-admin.username=${INITIAL_ADMIN_USERNAME:mouhcine}
app.bootstrap-admin.email=${INITIAL_ADMIN_EMAIL}
app.bootstrap-admin.password=${INITIAL_ADMIN_PASSWORD}

app.security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.security.login.ip-max-attempts=${LOGIN_IP_MAX_ATTEMPTS:20}
app.security.login.attempt-window=${LOGIN_ATTEMPT_WINDOW:15m}
app.security.login.block-duration=${LOGIN_BLOCK_DURATION:15m}
app.security.login.max-tracked-keys=${LOGIN_MAX_TRACKED_KEYS:10000}
