<aside
  class="fixed inset-y-0 left-0 z-30 flex w-20 flex-col border-r border-slate-800 bg-slate-950 px-3 py-5 text-white lg:w-72 lg:px-5">
  <div class="flex justify-center lg:hidden">
    <app-brand-mark [compact]="true" />
  </div>
  <div class="hidden lg:block [&_span]:!text-white [&_span_span]:!text-slate-400">
    <app-brand-mark />
  </div>

  <nav class="mt-9 flex-1 space-y-2" aria-label="Navigation principale">
    <a
      [routerLink]="user().roles.includes('ADMIN') ? '/admin/dashboard' : '/dashboard'"
      routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-950/30"
      class="group flex items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white lg:justify-start"
      title="Vue d’ensemble">
      <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
        aria-hidden="true">
        <rect x="3" y="3" width="5.5" height="5.5" rx="1" />
        <rect x="11.5" y="3" width="5.5" height="5.5" rx="1" />
        <rect x="3" y="11.5" width="5.5" height="5.5" rx="1" />
        <rect x="11.5" y="11.5" width="5.5" height="5.5" rx="1" />
      </svg>
      <span class="hidden lg:inline">Vue d’ensemble</span>
    </a>

    @if (user().roles.includes('ADMIN')) {
      <a
        routerLink="/admin/users/new"
        routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-950/30"
        class="group flex items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white lg:justify-start"
        title="Gérer les utilisateurs"
      >
        <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <circle cx="8" cy="6.5" r="3" />
          <path d="M2.8 16c.5-3 2.2-4.5 5.2-4.5 1.3 0 2.4.3 3.2.9M15 10.5v6M12 13.5h6" />
        </svg>
        <span class="hidden lg:inline">Utilisateurs</span>
      </a>
    }

    <a routerLink="/projects" routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-950/30"
      class="group flex items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white lg:justify-start"
      title="Projets">
      <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
        aria-hidden="true">
        <path d="m10 2.8 6.5 3.7v7L10 17.2l-6.5-3.7v-7L10 2.8Z" />
        <path d="m3.7 6.7 6.3 3.6 6.3-3.6M10 10.3v6.8" />
      </svg>
      <span class="hidden lg:inline">Projets</span>
    </a>

    <a routerLink="/deployments" routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-950/30"
      class="group flex items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white lg:justify-start"
      title="Déploiements">
      <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
        aria-hidden="true">
        <path d="M10 2.5c2.8 1.2 4.8 3.8 5 7.2l-3.1 3.1-4.7-4.7L10 2.5Z" />
        <path d="m7.2 8.1-2.6.7-1.8 2.4 4.2.4M11.9 12.8l-.7 2.6-2.4 1.8-.4-4.2M6.3 13.7l-2 2" />
      </svg>
      <span class="hidden lg:inline">Déploiements</span>
    </a>

    <div
      class="flex cursor-not-allowed items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-medium text-slate-500 lg:justify-start"
      title="Historique — bientôt disponible">
      <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
        aria-hidden="true">
        <path d="M3 5.5V2.8M3 5.5h2.7M3.2 5.3A7 7 0 1 1 3 13" />
        <path d="M10 6v4l2.7 1.6" />
      </svg>
      <span class="hidden lg:inline">Historique</span>
      <span
        class="ml-auto hidden rounded-full bg-slate-800 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide lg:inline">Bientôt</span>
    </div>
  </nav>

  <div class="border-t border-slate-800 pt-4">
    <div class="mb-4 hidden lg:block">
      <p class="truncate text-sm font-semibold text-white">{{ user().username }}</p>
      <p class="mt-1 truncate text-xs text-slate-400">{{ user().email }}</p>
      <div class="mt-3 flex flex-wrap gap-1">
        @for (role of user().roles; track role) {
        <app-role-badge [role]="role" />
        }
      </div>
    </div>

    <button type="button"
      class="flex w-full items-center justify-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-slate-400 transition hover:bg-red-500/10 hover:text-red-300 disabled:cursor-wait disabled:opacity-60 lg:justify-start"
      [disabled]="loggingOut()" (click)="logoutRequested.emit()" title="Se déconnecter">
      <svg class="size-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
        aria-hidden="true">
        <path d="M7.5 3.5H5A1.5 1.5 0 0 0 3.5 5v10A1.5 1.5 0 0 0 5 16.5h2.5M12.5 6.5 16 10l-3.5 3.5M16 10H7" />
      </svg>
      <span class="hidden lg:inline">{{ loggingOut() ? 'Déconnexion…' : 'Se déconnecter' }}</span>
    </button>
  </div>
</aside>
