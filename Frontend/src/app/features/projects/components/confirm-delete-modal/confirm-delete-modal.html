@if (open()) {
<div class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <button type="button" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" (click)="cancel.emit()"></button>

  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <div class="relative w-full transform overflow-hidden rounded-2xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:max-w-lg">
        
        <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
          <div class="sm:flex sm:items-start">
            <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
              <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
              <h3 class="text-base font-semibold leading-6 text-slate-900" id="modal-title">{{ title() }}</h3>
              <div class="mt-2">
                <p class="text-sm text-slate-500">{{ message() }}</p>
              </div>
            </div>
          </div>
        </div>
        
        <div class="bg-slate-50/50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 border-t border-slate-100">
          <button type="button" (click)="confirm.emit()" class="inline-flex w-full justify-center rounded-xl bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 sm:ml-3 sm:w-auto transition-colors">Supprimer</button>
          <button type="button" (click)="cancel.emit()" class="mt-3 inline-flex w-full justify-center rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 sm:mt-0 sm:w-auto transition-colors">Annuler</button>
        </div>

      </div>
    </div>
  </div>
</div>
}
