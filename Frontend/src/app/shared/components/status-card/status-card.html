<article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="mb-5 flex items-center justify-between">
    <p class="text-sm font-semibold text-slate-600">{{ label() }}</p>
    <span
      class="size-2.5 rounded-full"
      [class.bg-blue-500]="tone() === 'blue'"
      [class.bg-emerald-500]="tone() === 'emerald'"
      [class.bg-amber-500]="tone() === 'amber'"
    ></span>
  </div>
  <p class="text-3xl font-bold tracking-tight text-slate-950">{{ value() }}</p>
  <p class="mt-2 text-sm leading-6 text-slate-500">{{ description() }}</p>
</article>
